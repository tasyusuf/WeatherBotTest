name: Sabah Hava Durumu

on:
  schedule:
    - cron: '0 2 * * *'     # 09:00 Türkiye saati
    - cron: '30 6 * * *'    # 12:30 Türkiye saati
    - cron: '0 13 * * *'    # 18:00 Türkiye saati
  workflow_dispatch:  # Elle de tetiklenebilir (test için)

jobs:
  send-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bağımlılıkları yükle
        run: pip install requests gTTS python-telegram-bot python-dotenv pytz

      - name: Hava durumu gönder
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
        run: python send_weather.py
